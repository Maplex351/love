<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>给你的一封小信件 🐢</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  min-height: 100vh;
  background: linear-gradient(135deg, #e8f5e9 0%, #a5d6a7 30%, #66bb6a 60%, #43a047 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  overflow: hidden;
  position: relative;
}

.bubble-rain {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}

.bubble {
  position: absolute;
  top: -40px;
  animation: fall linear infinite;
  opacity: 0.5;
  font-size: 20px;
}

@keyframes fall {
  0%   { transform: translateY(-40px) rotate(0deg); opacity: 0.6; }
  100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
}

.card {
  position: relative;
  z-index: 1;
  background: rgba(255, 255, 255, 0.94);
  border-radius: 24px;
  padding: 36px 28px 32px;
  max-width: 420px;
  width: 92vw;
  text-align: center;
  box-shadow: 0 20px 60px rgba(56, 142, 60, 0.2), 0 0 0 1px rgba(255,255,255,0.5) inset;
  animation: cardIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  overflow: visible;
}

@keyframes cardIn {
  from { opacity: 0; transform: scale(0.7) translateY(40px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}

/* ===== 小乌龟 ===== */
.turtle-wrap {
  width: 150px;
  height: 130px;
  margin: 0 auto 20px;
  position: relative;
  animation: turtleBob 2.5s ease-in-out infinite;
}

@keyframes turtleBob {
  0%, 100% { transform: translateY(0) rotate(-2deg); }
  50%      { transform: translateY(-8px) rotate(2deg); }
}

.shell {
  position: absolute;
  bottom: 12px;
  left: 50%;
  transform: translateX(-50%);
  width: 92px;
  height: 68px;
  background: linear-gradient(145deg, #8d6e63, #5d4037);
  border-radius: 50% 50% 45% 45%;
  box-shadow: 0 4px 14px rgba(0,0,0,0.18);
  z-index: 2;
}

.shell::before {
  content: '';
  position: absolute;
  top: 14px; left: 50%;
  transform: translateX(-50%);
  width: 52px; height: 36px;
  border: 2px solid rgba(255,255,255,0.2);
  border-radius: 50%;
}

.shell::after {
  content: '';
  position: absolute;
  top: 8px; left: 50%;
  transform: translateX(-50%);
  width: 72px; height: 50px;
  border: 1.5px solid rgba(255,255,255,0.12);
  border-radius: 50%;
}

.shell-hex {
  position: absolute;
  top: 20px; left: 50%;
  transform: translateX(-50%);
  width: 28px; height: 20px;
  border: 2px solid rgba(255,255,255,0.18);
  border-radius: 4px;
  z-index: 3;
}

.turtle-head {
  position: absolute;
  bottom: 32px;
  right: 6px;
  width: 38px;
  height: 32px;
  background: #a5d6a7;
  border-radius: 50% 65% 40% 50%;
  z-index: 4;
}

.turtle-eye {
  position: absolute;
  top: 6px;
  right: 7px;
  width: 11px;
  height: 12px;
  background: #3e2723;
  border-radius: 50%;
  animation: blink 4s ease-in-out infinite;
}

.turtle-eye::after {
  content: '';
  position: absolute;
  top: 2px; left: 3px;
  width: 4px; height: 4px;
  background: white;
  border-radius: 50%;
}

@keyframes blink {
  0%, 42%, 52%, 100% { transform: scaleY(1); }
  47%                { transform: scaleY(0.1); }
}

.turtle-blush {
  position: absolute;
  bottom: 7px;
  right: 3px;
  width: 11px;
  height: 7px;
  background: rgba(239, 154, 154, 0.5);
  border-radius: 50%;
}

.turtle-smile {
  position: absolute;
  bottom: 11px;
  right: 10px;
  width: 9px;
  height: 5px;
  border-bottom: 2px solid #6d4c41;
  border-radius: 0 0 50% 50%;
}

.leg-fl, .leg-fr, .leg-bl, .leg-br {
  position: absolute;
  width: 22px;
  height: 15px;
  background: #a5d6a7;
  border-radius: 50%;
  z-index: 1;
}
.leg-fl { bottom: 4px; left: 20px; transform: rotate(-15deg); }
.leg-fr { bottom: 4px; right: 20px; transform: rotate(15deg); }
.leg-bl { bottom: 0; left: 14px; transform: rotate(-10deg); }
.leg-br { bottom: 0; right: 14px; transform: rotate(10deg); }

.turtle-tail {
  position: absolute;
  bottom: 20px;
  left: 10px;
  width: 16px;
  height: 7px;
  background: #a5d6a7;
  border-radius: 50% 20% 20% 50%;
  transform: rotate(-10deg);
  z-index: 1;
}

.turtle-heart {
  position: absolute;
  top: 4px; right: 2px;
  font-size: 20px;
  animation: heartPop 1.2s ease-in-out infinite;
  z-index: 5;
}

@keyframes heartPop {
  0%, 100% { transform: scale(1); }
  50%      { transform: scale(1.3); }
}

/* ===== 文字 ===== */
.title {
  font-size: 13px;
  color: #2e7d32;
  letter-spacing: 4px;
  margin-bottom: 12px;
  font-weight: 500;
}

.question {
  font-size: 22px;
  color: #37474f;
  font-weight: 600;
  line-height: 1.5;
  margin-bottom: 28px;
}

.question .highlight {
  color: #2e7d32;
}

/* ===== 按钮区 ===== */
.btn-area {
  display: flex;
  flex-direction: row;
  align-items: center;
  justify-content: center;
  gap: 16px;
  min-height: 60px;
  position: relative;
  overflow: visible;
}

.btn-yes {
  background: linear-gradient(135deg, #66bb6a, #388e3c);
  color: white;
  border: none;
  padding: 14px 40px;
  font-size: 18px;
  border-radius: 50px;
  cursor: pointer;
  font-weight: 600;
  letter-spacing: 2px;
  box-shadow: 0 6px 20px rgba(56, 142, 60, 0.4);
  transition: all 0.3s ease;
  -webkit-tap-highlight-color: transparent;
  flex-shrink: 0;
  white-space: nowrap;
  z-index: 2;
}

.btn-yes:active {
  transform: scale(0.95);
}

.btn-think {
  background: transparent;
  color: #b0bec5;
  border: 1.5px solid #cfd8dc;
  padding: 10px 24px;
  font-size: 14px;
  border-radius: 50px;
  cursor: pointer;
  transition: all 0.3s ease;
  -webkit-tap-highlight-color: transparent;
  flex-shrink: 0;
  white-space: nowrap;
  z-index: 1;
  line-height: 1.4;
}

.btn-think:active {
  opacity: 0.8;
}

.hint {
  margin-top: 12px;
  font-size: 12px;
  color: #81c784;
  opacity: 0;
  transition: opacity 0.5s ease;
}

.hint.show { opacity: 1; }

/* ===== 成功页 ===== */
.success-page {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: linear-gradient(135deg, #e8f5e9, #c8e6c9);
  z-index: 100;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 20px;
}

.success-page.show {
  display: flex;
  animation: fadeIn 0.6s ease;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}

.success-turtle {
  font-size: 90px;
  animation: successBounce 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  margin-bottom: 20px;
}

@keyframes successBounce {
  from { transform: scale(0) rotate(-20deg); }
  to   { transform: scale(1) rotate(0deg); }
}

.success-title {
  font-size: 26px;
  color: #2e7d32;
  font-weight: 700;
  margin-bottom: 12px;
}

.success-sub {
  font-size: 16px;
  color: #388e3c;
  line-height: 1.8;
}

.confetti-container {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 101;
}

.confetti {
  position: absolute;
  border-radius: 50%;
  animation: confettiFall 3s ease-out forwards;
}

@keyframes confettiFall {
  0%   { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg) scale(0.3); opacity: 0; }
}

.footer {
  position: fixed;
  bottom: 16px;
  font-size: 11px;
  color: rgba(255,255,255,0.6);
  z-index: 1;
  letter-spacing: 1px;
}
</style>
</head>
<body>

<div class="bubble-rain" id="bubbleRain"></div>

<div class="card" id="mainCard">
  <div class="turtle-wrap">
    <div class="turtle-tail"></div>
    <div class="leg-bl"></div>
    <div class="leg-br"></div>
    <div class="leg-fl"></div>
    <div class="leg-fr"></div>
    <div class="shell">
      <div class="shell-hex"></div>
    </div>
    <div class="turtle-head">
      <div class="turtle-eye"></div>
      <div class="turtle-blush"></div>
      <div class="turtle-smile"></div>
    </div>
    <div class="turtle-heart">💚</div>
  </div>

  <div class="title">—— 来 自 小 王 八 的 心 意 ——</div>
  <div class="question">
    可以成为我的<span class="highlight">主人</span>吗？
  </div>

  <div class="btn-area" id="btnArea">
    <button class="btn-yes" onclick="sayYes()">可 以 💚</button>
    <button class="btn-think" id="btnThink" onclick="thinkAgain()">要不再想想</button>
  </div>

  <div class="hint" id="hint"></div>
</div>

<div class="success-page" id="successPage">
  <div class="confetti-container" id="confettiBox"></div>
  <div class="success-turtle">🐢</div>
  <div class="success-title">恭喜你获得一只可爱小乌龟！</div>
  <div class="success-sub">
    小乌龟开心得翻了个身～<br>
    它会陪你很久很久的哦 🐢💚
  </div>
</div>

<div class="footer">with love 🐢</div>

<script>
(function createBubbleRain() {
  var container = document.getElementById('bubbleRain');
  var emojis = ['🐢', '💚', '🌿', '🍀', '✨', '🫧'];
  for (var i = 0; i < 18; i++) {
    var b = document.createElement('div');
    b.className = 'bubble';
    b.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    b.style.left = Math.random() * 100 + '%';
    b.style.animationDuration = (5 + Math.random() * 7) + 's';
    b.style.animationDelay = Math.random() * 8 + 's';
    b.style.fontSize = (14 + Math.random() * 16) + 'px';
    b.style.opacity = 0.3 + Math.random() * 0.4;
    container.appendChild(b);
  }
})();

var thinkCount = 0;
var hints = [
  '再想想嘛～ 🥺',
  '真的不带走我吗？ 🐢',
  '小乌龟会伤心的哦… 💔',
  '它眼巴巴看着你呢 🥹',
  '再给个机会吧～ 🍀',
  '你看"可以"都变大了，缘分到了！',
  '快点左边那个嘛～ 💚',
  '小乌龟在等你领养它… 🐢',
  '快放弃抵抗吧！',
  '最后一次机会咯～'
];

function thinkAgain() {
  thinkCount++;
  var yesBtn = document.querySelector('.btn-yes');
  var hint = document.getElementById('hint');

  var fontSize = 18 + thinkCount * 4;
  var padV = 14 + thinkCount * 4;
  var padH = 40 + thinkCount * 12;
  yesBtn.style.fontSize = fontSize + 'px';
  yesBtn.style.padding = padV + 'px ' + padH + 'px';
  yesBtn.style.boxShadow = '0 ' + (6 + thinkCount) + 'px ' + (20 + thinkCount * 4) + 'px rgba(56, 142, 60, ' + Math.min(0.4 + thinkCount * 0.05, 0.8) + ')';

  var hintIdx = Math.min(thinkCount - 1, hints.length - 1);
  hint.textContent = hints[hintIdx];
  hint.className = 'hint show';
}

function sayYes() {
  var card = document.getElementById('mainCard');
  card.style.transition = 'all 0.5s ease';
  card.style.transform = 'scale(0.8) translateY(30px)';
  card.style.opacity = '0';

  setTimeout(function() {
    document.getElementById('successPage').className = 'success-page show';
    launchConfetti();
  }, 400);
}

function launchConfetti() {
  var container = document.getElementById('confettiBox');
  var colors = ['#388e3c', '#66bb6a', '#a5d6a7', '#ffc107', '#ff9800', '#4caf50', '#81c784', '#c8e6c9'];
  for (var i = 0; i < 60; i++) {
    (function(index) {
      setTimeout(function() {
        var c = document.createElement('div');
        c.className = 'confetti';
        c.style.left = Math.random() * 100 + '%';
        c.style.top = '-10px';
        c.style.background = colors[Math.floor(Math.random() * colors.length)];
        c.style.width = (6 + Math.random() * 10) + 'px';
        c.style.height = c.style.width;
        c.style.animationDuration = (2 + Math.random() * 2) + 's';
        container.appendChild(c);
        setTimeout(function() { if (c.parentNode) c.parentNode.removeChild(c); }, 4000);
      }, index * 50);
    })(i);
  }
}
</script>
</body>
</html>
